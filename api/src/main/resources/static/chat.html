<!DOCTYPE html>
<html lang='en'>
<head>
    <title>Chat</title>
    <meta charset='UTF-8'>
    <meta content='chat' name='description'>
    <meta content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no' name='viewport'>
    <link href="styles/chat.css" rel="stylesheet">
</head>
<body>
<main id='app'>
    <div class="main">
        <div class="main-inner" v-if="user.signed">
            <div class="panel">
                <div class="header">
                    <div class="avatar">
                        <img class="img" src="images/avatar.png">
                    </div>
                    <div class="info">
                        <h3 class="nickname">
                            <span>{{user.nickname}}</span>
                            <a class="opt"><i class="web_wechat_add"></i></a>
                        </h3>
                    </div>
                </div>
                <div class="tab">
                </div>
                <div class="contact-list">
                    <div v-for="contact in contacts" :class="contact.id === recipient.id ? 'active' : ''" @click="switchUser(contact)" class="contact-item">
                        <div class="avatar">
                            <img class="img" src="images/avatar.png">
                        </div>
                        <div class="info">
                            <h3 class="nickname">
                                <span>{{contact.nickname}}</span>
                            </h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="chat">
                <div class="title">
                    <span class="">{{recipient.nickname}}</span>
                </div>
                <div class="message-list" id="message-list">
                    <div v-for="record in displayRecords" :class="record.sender === user.id ? 'right' : 'left'" class="message">
                        <div class="avatar">
                            <img class="img" src="images/avatar.png">
                        </div>
                        <div class="bubble" :class="record.sender === user.id ? 'primary' : ''">{{record.content}}</div>
                    </div>
                    <!--<div class="timer">
                        <div class="content">17:50</div>
                    </div>-->
                </div>
                <div class="input-area">
                    <div class="toolbar">
                        <a class="web_wechat_face"></a>
                        <a class="web_wechat_pic"></a>
                    </div>
                    <div class="content">
                       <textarea v-model="message.content" @keyup.enter="sendMessage" class="edit-box">
                       </textarea>
                    </div>
                    <div class="action">
                        <span class="desc" @click="scrollToBottom">Press Ctrl+Enter to start a new line</span>
                        <button class="btn btn-send" @click="sendMessage">Send</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="sign-box" v-else>
            <span class="sign-title">Sign in to Chat</span>
            <!--<input v-model="sign.username" type="text" @keyup.enter="signIn" required="required" maxlength="18" placeholder="Username">-->
            <select v-model="sign.username">
                <option :value="u" v-for="u in users">{{u}}</option>
            </select>
            <input @keyup.enter="signIn" disabled="disabled" maxlength="18" placeholder="Password" required="required" type="password" v-model="sign.password" value="123456">
            <button :disabled="signing" @click="signIn" class="btn btn-sign">{{signing ? 'Signing in' : 'Sign in'}}</button>
        </div>
    </div>
</main>
<script src='scripts/vue.min.js'></script>
<script src='scripts/axios.min.js'></script>
<script src="scripts/protobuf.min.js"></script>
<script>
    const api = {
        account: {
            signIn(params, callback) {
                $post('/sessions', params, callback);
            },
            signOut(params, callback) {
                $delete('/sessions', params, callback);
            },
            getUser(params, callback) {
                $get('/sessions', params, callback);
            },
        },
        contact: {
            get(params, callback) {
                $get('/contacts', null, callback);
            },
        },
        message: {
            get(params, callback) {
                $get('/messages/' + params, null, callback);
            },
            save(params, callback) {
                $post('/messages', params, callback);
            },
            mark(params, callback) {
                $patch('/messages/' + params, null, callback);
            },
            listUnread(params, callback) {
                $get('/messages/unread', params, callback);
            },
        },
    };

    const vm = new Vue({
        el: '#app',
        data: {
            ws: null,
            status: 0,
            URL: null,
            proto: {
                box: null,
                message: null,
                token: null,
            },
            codes: {
                UNKNOWN: 0,
                ERROR: 1,
                HEARTBEAT: 2,
                AUTHENTICATION: 3,
                SEND_MESSAGE: 10,
                RECEIVE_MESSAGE: 11,
                RECEIVED_MESSAGE: 12,
                DELIVERED_MESSAGE: 13,
                DELIVERED_OFFLINE_MESSAGE: 14,
            },
            users: [
                "dante",
                "vergil",
                "nero",
                "sparda",
                "lady",
                "trish",
                "lucia",
                "beryl",
                "credo",
                "kyrie",
                "nico",
            ],
            sign: {
                username: null,
                password: 123456,
            },
            user: {
                id: null,
                username: null,
                token: null,
                signed: false,
            },
            contacts: [],
            message: {
                recipient: null,
                content: null,
            },
            recipient: {
                id: null,
                nickname: null,
            },
            totalRecords: {},
            displayRecords: [],
            sending: false,
            signing: false,
        },
        methods: {
            getSession() {
                api.account.getUser(null, (result) => {
                    if (!result.success) {
                        return;
                    }
                    this.user = result.data;
                    this.user.signed = true;
                    this.connect();
                });
            },
            signIn() {
                if (!this.sign.username) {
                    return;
                }
                api.account.signIn(this.sign, (result) => {
                    this.signing = false;
                    if (!result.success) {
                        //$notify.error(result.message);
                        return;
                    }
                    this.user = result.data;
                    this.user.signed = true;
                    this.setCookie("access_token", this.user.token, 10000000);
                    this.connect();
                });
            },
            connect() {
                api.contact.get(null, (result) => {
                    if (!result.success) {
                        //$notify.error(result.message);
                        return;
                    }
                    this.contacts = result.data;
                    if (this.contacts.length > 0) {
                        for (let i in this.contacts) {
                            let id = this.contacts[i].id;
                            this.totalRecords[id] = [];
                        }
                        this.switchUser(this.contacts[0]);
                    }
                });
                this.ws = new WebSocket("ws://localhost:20000/chat?access_token=" + this.user.token);
                this.ws.binaryType = "arraybuffer";
                this.ws.onopen = event => this.onopen(event);
                this.ws.onclose = event => this.onclose(event);
                this.ws.onmessage = event => this.onmessage(event);
                setInterval(() => {
                    this.ping();
                }, 30000);
            },
            switchUser(user) {
                this.recipient = user;
                this.displayRecords = this.totalRecords[this.recipient.id];
            },
            sendMessage() {
                if (this.status !== 1 || this.message.content === null || this.message.content === '' || this.sending) {
                    return;
                }
                this.sending = true;
                let m = {
                    sender: this.user.id,
                    content: this.message.content,
                    sending: 1,
                };
                this.message.recipient = this.recipient.id;
                this.totalRecords[this.recipient.id].push(m);
                this.scrollToBottom();
                api.message.save(this.message, (result) => {
                    this.sending = false;
                    if (!result.success) {
                        //$notify.error(result.message);
                        return;
                    }
                    this.message.content = null;
                    let message = result.data;
                    this.sendMsg({id: message.id, recipient: message.recipient, sender: message.sender});
                    m.id = message.id;
                    m.sending = 0;
                    m.time = this.format(new Date());
                });
            },
            getMessage(id, callback) {
                api.message.get(id, (result) => {
                    if (!result.success) {
                        //$notify.error(result.message);
                        return;
                    }
                    console.log(result.data, result.data.content);
                    api.message.mark(id, (result2) => {
                        callback(result.data);
                    });
                });
            },
            listUnread(anchor) {
                api.message.listUnread(anchor, (result) => {
                    if (!result.success) {
                        //$notify.error(result.message);
                        return;
                    }
                    if (result.data.length === 0) {
                        this.status = 1;
                        return;
                    }
                    let messages = result.data;
                    for (let i in messages) {
                        this.totalRecords[messages[i].sender].push(messages[i]);
                    }
                    this.listUnread({anchor: messages[messages.length - 1].id});
                });
            },
            ping() {
                this.send(this.codes.HEARTBEAT, null);
            },
            sendMsg(msg) {
                let data = this.pack(this.proto.message.encode(msg).finish(), this.proto.message)
                this.send(this.codes.SEND_MESSAGE, data);
            },
            send(code, data) {
                let box = this.proto.box.create({code, data});
                let buffer = this.proto.box.encode(box).finish();
                this.ws.send(buffer);
            },
            pack(value, type) {
                return this.proto.any.create({
                    type_url: 'type.googleapis.com/' + type.name,
                    value: value
                });
            },
            unpack(data, type) {
                return type.decode(data.value)
            },
            onopen(event) {
                console.log("Connected", event);
                this.listUnread(null);
            },
            onclose(event) {
                console.log("Disconnected", event);
                this.status = 2;
            },
            onmessage(event) {
                console.log(event);
                let box = this.proto.box.decode(new Uint8Array(event.data));
                console.log(box);
                if (box.code === this.codes.RECEIVE_MESSAGE) {
                    let message = this.unpack(box.data, this.proto.message);
                    console.log('RECEIVE_MESSAGE', message);
                    this.getMessage(message.id, (data) => {
                        this.totalRecords[data.sender].push(data);
                        this.scrollToBottom();
                        this.send(this.codes.RECEIVED_MESSAGE, box.data);
                    });
                } else if (box.code === this.codes.DELIVERED_MESSAGE) {
                    let message = this.unpack(box.data, this.proto.message);
                    console.log('DELIVERED_MESSAGE', message);
                } else if (box.code === this.codes.DELIVERED_OFFLINE_MESSAGE) {
                    let message = this.unpack(box.data, this.proto.message);
                    console.log('DELIVERED_OFFLINE_MESSAGE', message);
                }
            },
            scrollToBottom() {
                let box = this.$el.querySelector("#message-list");
                if (box.scrollTop <= 1 || Math.abs(box.scrollTop + box.offsetHeight - box.scrollHeight) <= 10) {
                    this.$nextTick(() => {
                        //console.log(box.scrollTop, box.scrollHeight, box.offsetHeight, box.scrollTop + box.offsetHeight - box.scrollHeight);
                        box.scrollTop = box.scrollHeight;
                    })
                }
            },
            isConnecting() {
                return this.ws.readyState === 0;
            },
            isOpen() {
                return this.ws.readyState === 1;
            },
            close() {
                this.ws.close();
            },
            format(date) {
                let pattern = "yyyy-MM-dd HH:mm:ss";
                let o = {
                    "M+": date.getMonth() + 1,
                    "d+": date.getDate(),
                    "H+": date.getHours(),
                    "m+": date.getMinutes(),
                    "s+": date.getSeconds(),
                    "q+": Math.floor((date.getMonth() + 3) / 3),
                    "S": date.getMilliseconds()
                };
                if (/(y+)/.test(pattern)) {
                    pattern = pattern.replace(RegExp.$1, (date.getFullYear() + "").substr(4 - RegExp.$1.length));
                }
                for (let k in o) {
                    if (new RegExp("(" + k + ")").test(pattern)) {
                        pattern = pattern.replace(RegExp.$1, (RegExp.$1.length === 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length)));
                    }
                }
                return pattern;
            },
            init() {
                this.URL = window.URL || window.webkitURL || window.mozURL;
                if (!this.URL) {
                    alert("Unsupported");
                    return;
                }
                protobuf.load("./google/protobuf/any.proto", (err, root) => {
                    if (err) {
                        throw err;
                    }
                    const proto =
                        `syntax = "proto3";
                        import "google/protobuf/any.proto";
                        package Chatter;
                        message Box { google.protobuf.Any data = 1; string message = 2; int32 code = 3; }
                        message Message { string id = 1; int64 recipient = 2; int64 sender = 3; }
                        message Token { string value = 1; }`;
                    let chat = protobuf.parse(proto, root);
                    this.proto.any = root.lookupType("google.protobuf.Any");
                    this.proto.box = chat.root.lookupType("Chatter.Box");
                    this.proto.message = chat.root.lookupType("Chatter.Message");
                    this.proto.token = chat.root.lookupType("Chatter.Token");
                    this.getSession();
                });
            },
        },
        created() {
            this.init();
        },
    });

    function $get(uri, params, callback) {
        handler(axios.get(uri, {params}), callback);
    }

    function $post(uri, params, callback) {
        handler(axios.post(uri, params), callback);
    }

    function $put(uri, params, callback) {
        handler(axios.put(uri, params), callback);
    }

    function $patch(uri, params, callback) {
        handler(axios.patch(uri, params), callback);
    }

    function $delete(uri, params, callback) {
        handler(axios.delete(uri, {params}), callback);
    }

    function handler(o, callback) {
        o.then((result) => {
            if (callback) {
                callback(result.data);
            }
        }).catch((error) => {
            if (callback) {
                callback({
                    success: false,
                    message: error.response.statusText
                });
            }
        });
    }

    function getCookie(key) {
        let cookies = document.cookie.split("; ");
        for (let i = 0; i < cookies.length; i++) {
            let entry = cookies[i].split("=");
            if (entry[0] === key) {
                return decodeURI(entry[1]);
            }
        }
        return null;
    }

    function setCookie(key, value, time) {
        let date = new Date();
        date.setTime(date.getTime() + time);
        document.cookie = key + "=" + value + "; expires=" + date.toGMTString();
    }

    function getQueryVariable(variable) {
        let query = window.location.search.substring(1);
        let vars = query.split("&");
        for (let i = 0; i < vars.length; i++) {
            let pair = vars[i].split("=");
            if (pair[0] == variable) {
                return pair[1];
            }
        }
        return false;
    }
</script>
</body>
</html>
