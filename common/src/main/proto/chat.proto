syntax = "proto3";
import "google/protobuf/any.proto";
option java_package = "io.leego.chat.util";
option java_outer_classname = "ChatFactory";

message Box {
    google.protobuf.Any data = 1;
    string message = 2;
    int32 code = 3;
}

message Message {
    string id = 1;
    int64 recipient = 2;
    int64 sender = 3;
}

message Token {
    string value = 1;
}